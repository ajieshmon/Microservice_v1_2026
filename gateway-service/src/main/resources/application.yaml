server:
  port: 8080

jwt:
  secret: mysecretkeymysecretkeymysecretkey12345

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: order-service
          #uri: http://localhost:8081
          uri: http://order-service:8081
          predicates:
            - Path=/api/orders/**
          filters:

            # 1️⃣ Rate Limiter
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 4
                redis-rate-limiter.burstCapacity: 5

            # 2️⃣ Retry
            - name: Retry
              args:
                retries: 3
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                methods:
                  - GET
                  - POST

            # 3️⃣ Circuit Breaker
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/order

        - id: payment-service
          #uri: http://localhost:8082
          uri: http://payment-service:8082
          predicates:
            - Path=/api/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentCircuitBreaker
                fallbackUri: forward:/fallback/payment

        - id: inventory-service
          uri: http://inventory-service:8083
          #uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryCircuitBreaker
                fallbackUri: forward:/fallback/inventory
  data:
    redis:
      #host: localhost
      host: redis
      port: 6379

resilience4j:
  circuitbreaker:
    instances:
      orderCircuitBreaker:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      paymentCircuitBreaker:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      inventoryCircuitBreaker:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
      #endpoint: http://localhost:9411/api/v2/spans